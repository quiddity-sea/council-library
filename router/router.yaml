# Council Library — Cognitive Router Configuration
# Blueprint §5.3

model_profiles:
  system1_local:
    provider: "ollama"
    model: "gemma4:31b"
    base_url: "http://localhost:11434"
    max_tokens: 8192
    temperature: 0.4
    tags: ["local", "private", "personality", "fast"]

  system2_light:
    provider: "openrouter"
    model: "qwen/qwen3-32b:free"
    max_tokens: 32768
    temperature: 0.2
    tags: ["reasoning", "coding", "cloud", "free_tier"]

  system2_heavy:
    provider: "openrouter"
    model: "deepseek/deepseek-v4-pro"
    max_tokens: 131072
    temperature: 0.1
    tags: ["architect", "heavy_reasoning", "planning", "cloud"]

router:
  enabled: true
  privacy_scan_enabled: true
  private_patterns:
    - "api[_-]?key"
    - "secret"
    - "password"
    - "token"
    - "/home/"
    - "/Users/"
    - "C:\\\\Users\\\\"

  daily_budget_tokens:
    system2_heavy: 500000
    system2_light: 2000000

agent_overrides:
  curator:
    system2_heavy:
      model: "nous/hermes-3-70b"
  producer:
    system2_light:
      model: "qwen/qwen3-coder"
    system2_heavy:
      model: "deepseek/deepseek-v4-pro"
  coach:
    system2_light:
      model: "anthropic/claude-sonnet-4"
  director:
    system2_heavy:
      model: "deepseek/deepseek-v4-pro"
