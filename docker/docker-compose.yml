version: "3.9"
services:
  mariadb:
    image: mariadb:11.8
    container_name: council-library-db
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MARIADB_DATABASE: quiddity_commons
      MARIADB_USER: zeon7_user
      MARIADB_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/var/lib/mysql
      - ./schema:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./php-api
      dockerfile: ../docker/Dockerfile.api
    container_name: council-library-api
    environment:
      DB_HOST: mariadb
      DB_USER: zeon7_user
      DB_PASS: ${DB_PASS}
      LOG_LEVEL: DEBUG
      FOREVERBOX_API_KEY: ${FOREVERBOX_API_KEY:-dev-key-change-in-production}
    ports:
      - "8080:80"
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - ./php-api:/var/www/html:ro
      - ${QUIDDITY_HOST_PATH:-/foreverbox_data/Quiddity_Lore_Sea}:/data/quiddity:ro

volumes:
  db_data:
